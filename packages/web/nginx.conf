server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy to gateway
    location /api/ {
        proxy_pass http://gateway:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Auth callback — 交给前端 SPA 处理（从 hash 读取 token）
    location = /auth/callback {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Auth proxy to gateway (OAuth initiate + backend callback)
    location /auth/ {
        proxy_pass http://gateway:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check proxy
    location /health {
        proxy_pass http://gateway:3100;
    }

    # SPA fallback — index.html 禁用缓存，确保每次拿到最新版本
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
