# ArcFlow Core Services
# - Gateway: Bun + Hono API (port 3100)
# - Web: Vue3 管理界面 (port 80)
#
# 其他服务独立部署：
# - Plane CE: setup/plane/docker-compose.yml
# - NanoClaw: 独立仓库 + PM2，见 setup/nanoclaw/README.md
# 历史上的 Dify / Weaviate / Wiki.js 已下线，不再作为当前部署依赖

services:
  # ─── ArcFlow Gateway (Bun + Hono) ────────────────────────────────
  gateway:
    build: ./packages/gateway
    container_name: arcflow-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-3100}:3100"
    volumes:
      - gateway-data:/app/data
      - git-workdir:/tmp/gateway-git
    env_file:
      - ./packages/gateway/.env
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3100/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  # ─── ArcFlow Web (Vue3 + Nginx) ──────────────────────────────────
  web:
    build: ./packages/web
    container_name: arcflow-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      gateway:
        condition: service_healthy

# 当前 compose 仅托管本仓两个核心服务：
# - `gateway`
# - `web`
# 其余协作系统按各自目录或独立仓部署。

volumes:
  gateway-data:
  git-workdir:
