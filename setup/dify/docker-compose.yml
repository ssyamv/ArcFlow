# Dify AI 编排平台 + Weaviate 向量数据库
# 基于官方 v1.13.3 配置精简
# 用法: cp .env.example .env && 编辑 .env && docker compose up -d

x-shared-env: &shared-env
  SECRET_KEY: ${DIFY_SECRET_KEY:-change-me-to-a-random-secret}
  DEPLOY_ENV: PRODUCTION
  MIGRATION_ENABLED: "true"
  DIFY_BIND_ADDRESS: 0.0.0.0
  DIFY_PORT: 5001
  # DB
  DB_TYPE: postgresql
  DB_USERNAME: ${DIFY_DB_USER:-dify}
  DB_PASSWORD: ${DIFY_DB_PASSWORD:-dify}
  DB_HOST: dify-db
  DB_PORT: 5432
  DB_DATABASE: ${DIFY_DB_NAME:-dify}
  # Redis
  REDIS_HOST: dify-redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${DIFY_REDIS_PASSWORD:-}
  REDIS_DB: 0
  CELERY_BROKER_URL: redis://${DIFY_REDIS_PASSWORD:+:${DIFY_REDIS_PASSWORD}@}dify-redis:6379/1
  # Storage
  STORAGE_TYPE: opendal
  OPENDAL_SCHEME: fs
  OPENDAL_FS_ROOT: storage
  # Vector DB
  VECTOR_STORE: weaviate
  WEAVIATE_ENDPOINT: http://dify-weaviate:8080
  WEAVIATE_API_KEY: ${WEAVIATE_API_KEY:-change-me-weaviate-key}
  # Sandbox
  CODE_EXECUTION_ENDPOINT: http://dify-sandbox:8194
  CODE_EXECUTION_API_KEY: ${SANDBOX_API_KEY:-dify-sandbox}
  # CORS
  WEB_API_CORS_ALLOW_ORIGINS: ${WEB_API_CORS_ALLOW_ORIGINS:-*}
  CONSOLE_CORS_ALLOW_ORIGINS: ${CONSOLE_CORS_ALLOW_ORIGINS:-*}
  # SSRF proxy
  SSRF_PROXY_HTTP_URL: http://dify-ssrf:3128
  SSRF_PROXY_HTTPS_URL: http://dify-ssrf:3128
  # Plugin daemon
  PLUGIN_DAEMON_URL: http://dify-plugin:5002
  PLUGIN_DAEMON_KEY: ${PLUGIN_DAEMON_KEY:-change-me-plugin-key}
  PLUGIN_DIFY_INNER_API_KEY: ${PLUGIN_INNER_API_KEY:-change-me-inner-key}

services:
  # ─── Dify API ─────────────────────────────────────────────
  dify-api:
    image: langgenius/dify-api:1.13.3
    container_name: arcflow-dify-api
    restart: unless-stopped
    environment:
      <<: *shared-env
      MODE: api
    volumes:
      - dify-storage:/app/api/storage
    depends_on:
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
    ports:
      - "${DIFY_API_PORT:-5001}:5001"
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -sf http://localhost:5001/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─── Dify Worker ──────────────────────────────────────────
  dify-worker:
    image: langgenius/dify-api:1.13.3
    container_name: arcflow-dify-worker
    restart: unless-stopped
    environment:
      <<: *shared-env
      MODE: worker
    volumes:
      - dify-storage:/app/api/storage
    depends_on:
      - dify-api

  # ─── Dify Worker Beat ─────────────────────────────────────
  dify-beat:
    image: langgenius/dify-api:1.13.3
    container_name: arcflow-dify-beat
    restart: unless-stopped
    environment:
      <<: *shared-env
      MODE: beat
    depends_on:
      - dify-api

  # ─── Dify Web ─────────────────────────────────────────────
  dify-web:
    image: langgenius/dify-web:1.13.3
    container_name: arcflow-dify-web
    restart: unless-stopped
    ports:
      - "${DIFY_WEB_PORT:-3001}:3000"
    environment:
      CONSOLE_API_URL: ${DIFY_CONSOLE_API_URL:-}
      APP_API_URL: ${DIFY_APP_API_URL:-}
      NEXT_PUBLIC_API_PREFIX: ${DIFY_CONSOLE_API_URL:-}/console/api
      NEXT_PUBLIC_PUBLIC_API_PREFIX: ${DIFY_APP_API_URL:-}/api

  # ─── Sandbox (代码执行沙箱) ───────────────────────────────
  dify-sandbox:
    image: langgenius/dify-sandbox:0.2.14
    container_name: arcflow-dify-sandbox
    restart: unless-stopped
    environment:
      API_KEY: ${SANDBOX_API_KEY:-dify-sandbox}
      GIN_MODE: release
      WORKER_TIMEOUT: 15
      ENABLE_NETWORK: "true"
      HTTP_PROXY: http://dify-ssrf:3128
      HTTPS_PROXY: http://dify-ssrf:3128
      SANDBOX_PORT: 8194

  # ─── Plugin Daemon (插件服务) ─────────────────────────────
  dify-plugin:
    image: langgenius/dify-plugin-daemon:0.5.3-local
    container_name: arcflow-dify-plugin
    restart: unless-stopped
    environment:
      DB_TYPE: postgresql
      DB_USERNAME: ${DIFY_DB_USER:-dify}
      DB_PASSWORD: ${DIFY_DB_PASSWORD:-dify}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: ${DIFY_PLUGIN_DB:-dify_plugin}
      DB_SSL_MODE: disable
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${DIFY_REDIS_PASSWORD:-}
      SERVER_PORT: 5002
      SERVER_KEY: ${PLUGIN_DAEMON_KEY:-change-me-plugin-key}
      DIFY_INNER_API_URL: http://dify-api:5001
      DIFY_INNER_API_KEY: ${PLUGIN_INNER_API_KEY:-change-me-inner-key}
      PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALLING_PORT: 5003
      PLUGIN_WORKING_PATH: /app/storage/cwd
      FORCE_VERIFYING_SIGNATURE: "false"
      PYTHON_ENV_INIT_TIMEOUT: 600
      HTTP_PROXY: http://172.29.230.21:7897
      HTTPS_PROXY: http://172.29.230.21:7897
      PLUGIN_MAX_EXECUTION_TIMEOUT: 600
    volumes:
      - dify-plugin-storage:/app/storage
    depends_on:
      - dify-api
      - dify-db

  # ─── SSRF Proxy ───────────────────────────────────────────
  dify-ssrf:
    image: ubuntu/squid:latest
    container_name: arcflow-dify-ssrf
    restart: unless-stopped
    volumes:
      - ./ssrf_proxy/squid.conf:/etc/squid/squid.conf:ro

  # ─── PostgreSQL ───────────────────────────────────────────
  dify-db:
    image: postgres:15-alpine
    container_name: arcflow-dify-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DIFY_DB_USER:-dify}
      POSTGRES_PASSWORD: ${DIFY_DB_PASSWORD:-dify}
      POSTGRES_DB: ${DIFY_DB_NAME:-dify}
    volumes:
      - dify-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DIFY_DB_USER:-dify}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c max_connections=100
        -c shared_buffers=128MB
        -c work_mem=4MB

  # ─── Redis ────────────────────────────────────────────────
  dify-redis:
    image: redis:6-alpine
    container_name: arcflow-dify-redis
    restart: unless-stopped
    command: >
      redis-server
        ${DIFY_REDIS_PASSWORD:+--requirepass ${DIFY_REDIS_PASSWORD}}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Weaviate 向量数据库 ──────────────────────────────────
  dify-weaviate:
    image: semitechnologies/weaviate:1.27.0
    container_name: arcflow-dify-weaviate
    restart: unless-stopped
    ports:
      - "${WEAVIATE_PORT:-8080}:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_API_KEY:-change-me-weaviate-key}
      AUTHENTICATION_APIKEY_USERS: ${WEAVIATE_API_KEY:-change-me-weaviate-key}
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate-data:/var/lib/weaviate

volumes:
  dify-storage:
  dify-db-data:
  dify-plugin-storage:
  weaviate-data:
