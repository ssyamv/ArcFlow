name: Security

on:
  pull_request:
    branches: [main, develop, test]
  pull_request_target:
    branches: [main, develop, test]
    types: [labeled]

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    # 仓库内部 PR 自动触发；外部 fork PR 需 approved-for-ci 标签
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'pull_request_target' && github.event.action == 'labeled' && github.event.label.name == 'approved-for-ci')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm install --package-lock-only --ignore-scripts
        working-directory: packages/gateway
      - run: npm audit --audit-level=high
        working-directory: packages/gateway

  audit-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm install --package-lock-only --ignore-scripts
        working-directory: packages/web
      - run: npm audit --audit-level=high
        working-directory: packages/web

  license-check-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: bun install
        working-directory: packages/gateway
      - run: |
          npx license-checker --production --onlyAllow \
            "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;UNLICENSED"
        working-directory: packages/gateway

  license-check-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: bun install
        working-directory: packages/web
      - run: |
          npx license-checker --production --onlyAllow \
            "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;UNLICENSED"
        working-directory: packages/web
