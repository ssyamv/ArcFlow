name: CI

on:
  pull_request:
    branches: [main, develop, test]
  pull_request_target:
    branches: [main, develop, test]
    types: [labeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    # 仓库内部 PR 自动触发；外部 fork PR 需 approved-for-ci 标签
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'pull_request_target' && github.event.action == 'labeled' && github.event.label.name == 'approved-for-ci')
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            gateway:
              - 'packages/gateway/**'
            web:
              - 'packages/web/**'
            docs:
              - 'docs/**'
              - '**/*.md'

  lint-gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17
      - run: bun install
      - run: bun run lint
        working-directory: packages/gateway
      - run: bunx prettier --check packages/gateway/

  lint-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17
      - run: bun install
      - run: bun run lint
        working-directory: packages/web
      - run: bunx prettier --check packages/web/

  lint-docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17
      - run: bun install
      - run: bunx markdownlint-cli2 "docs/**/*.md"

  test-gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17
      - run: bun install
      - name: Run tests
        run: |
          rm -rf coverage coverage-base coverage-workflow
          bun test --coverage --coverage-reporter lcov src/{index,config}.test.ts src/middleware/ src/routes/{api,auth,conversations,health,workspaces,batch-2f}.test.ts src/services/{feishu,git,claude-code,plane,plane-webhook,ibuild,ibuild-log-fetcher,prd,rag-sync,auth}.test.ts
          mv coverage coverage-base
          bun test --coverage --coverage-reporter lcov src/index.test.ts src/services/workflow-writeback.test.ts src/services/workflow-callback.test.ts
          mv coverage coverage-workflow
          bun test src/db/ && bun test src/scheduler.test.ts src/services/workflow.test.ts && bun test src/routes/docs.test.ts && bun test src/routes/webhook.test.ts
        working-directory: packages/gateway
        timeout-minutes: 3
      - name: Install lcov
        run: sudo apt-get install -y lcov
      - name: Check coverage
        run: |
          mkdir -p packages/gateway/coverage
          lcov -a packages/gateway/coverage-base/lcov.info -a packages/gateway/coverage-workflow/lcov.info -o packages/gateway/coverage/lcov.info
          COVERAGE=$(lcov --summary packages/gateway/coverage/lcov.info 2>&1 | grep 'lines' | grep -o '[0-9.]*%' | head -1 | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 50" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below threshold 50%"
            exit 1
          fi

  test-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17
      - run: bun install
      - run: bunx vitest run --coverage --coverage.reporter=lcov
        working-directory: packages/web
      - name: Install lcov
        run: sudo apt-get install -y lcov
      - name: Check coverage
        run: |
          COVERAGE=$(lcov --summary packages/web/coverage/lcov.info 2>&1 | grep 'lines' | grep -o '[0-9.]*%' | head -1 | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          echo "::notice::Web coverage: ${COVERAGE}% (threshold enforcement deferred until component library stabilized)"
